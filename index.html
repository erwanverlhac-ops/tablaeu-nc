<section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-5 border border-slate-100 rounded-2xl shadow-sm hover:shadow-md transition">
                <h3 class="text-center font-bold text-slate-700 mb-4 uppercase text-xs tracking-wider">Top 5 - Causes de Réclamations</h3>
                <div class="relative h-60 w-full">
                    <canvas id="paretoChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-5 border border-slate-100 rounded-2xl shadow-sm hover:shadow-md transition">
                <h3 class="text-center font-bold text-slate-700 mb-4 uppercase text-xs tracking-wider">Lignes les plus touchées</h3>
                <div class="relative h-60 w-full">
                    <canvas id="localisationChart"></canvas>
                </div>
            </div>
        </section>

        <section class="mb-4">
            <div class="bg-white p-5 border border-slate-100 rounded-2xl shadow-sm hover:shadow-md transition">
                <h3 class="text-center font-bold text-slate-700 mb-4 uppercase text-xs tracking-wider">Évolution Annuelle des Réclamations (Juin 21 - Juin 22)</h3>
                <div class="relative h-64 w-full">
                    <canvas id="historiqueChart"></canvas>
                </div>
            </div>
        </section>

    </div>

<script>
    // Enregistrer le plugin Datalabels
    Chart.register(ChartDataLabels);

    // Couleurs de la charte graphique
    const colors = {
        red: '#e11d48',
        orange: '#f59e0b',
        blue: '#3b82f6',
        green: '#10b981',
        slate: '#64748b',
        lightBlue: 'rgba(59, 130, 246, 0.1)',
    };

    // Graphique 1 : Origine
    new Chart(document.getElementById('origineChart'), {
        type: 'doughnut',
        data: {
            labels: ['Consommateur', 'Client Pro', 'Distributeur'],
            datasets: [{
                data: [36, 4, 4], 
                backgroundColor: [colors.orange, colors.blue, colors.slate],
                borderWidth: 3,
                borderColor: '#ffffff',
                hoverOffset: 4
            }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            cutout: '65%',
            plugins: { 
                legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } },
                datalabels: { color: '#fff', font: { weight: 'bold', size: 14 } }
            } 
        }
    });

    // Graphique 2 : Évolution par semaine
    new Chart(document.getElementById('evolutionChart'), {
        type: 'line',
        data: {
            labels: ['S1 (1-5)', 'S2 (6-12)', 'S3 (13-19)', 'S4 (20-26)', 'S5 (27-30)'],
            datasets: [{
                label: 'Nombre de réclamations',
                data: [9, 12, 10, 8, 5],
                borderColor: colors.blue,
                backgroundColor: colors.lightBlue,
                borderWidth: 3,
                fill: true,
                tension: 0.4,
                pointBackgroundColor: colors.blue,
                pointBorderColor: '#fff',
                pointBorderWidth: 2,
                pointRadius: 6,
                pointHoverRadius: 8
            }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            layout: { padding: { top: 20 } },
            scales: { 
                y: { beginAtZero: true, suggestedMax: 15, grid: { borderDash: [4, 4] }, ticks: { precision: 0 } },
                x: { grid: { display: false } }
            }, 
            plugins: { 
                legend: { display: false },
                datalabels: { align: 'top', anchor: 'end', color: colors.blue, font: { weight: 'bold', size: 12 }, offset: 4 }
            } 
        }
    });

    // Graphique 3 : Pareto des Causes (Top 5)
    new Chart(document.getElementById('paretoChart'), {
        type: 'bar',
        data: {
            labels: ['Insectes', 'Casse sec', 'Emballage abimé', 'Casse cuit', 'Sous-poids'],
            datasets: [{
                label: 'Occurrences',
                data: [13, 7, 6, 4, 3],
                backgroundColor: [colors.red, colors.slate, colors.slate, colors.slate, colors.slate],
                borderRadius: 6,
                barPercentage: 0.6
            }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            layout: { padding: { top: 20 } },
            scales: { 
                y: { beginAtZero: true, suggestedMax: 15, grid: { borderDash: [4, 4] }, ticks: { precision: 0 } },
                x: { grid: { display: false } }
            }, 
            plugins: { 
                legend: { display: false },
                datalabels: { align: 'top', anchor: 'end', color: '#475569', font: { weight: 'bold' } }
            } 
        }
    });

    // Graphique 4 : Lignes de conditionnement
    new Chart(document.getElementById('localisationChart'), {
        type: 'bar',
        data: {
            labels: ['Ligne N', 'Ligne M', 'Ligne K', 'Ligne G', 'Ligne A', 'Autres'],
            datasets: [{
                label: 'Nombre d\'incidents',
                data: [8, 6, 6, 4, 4, 16],
                backgroundColor: colors.orange,
                borderRadius: 6,
                barPercentage: 0.6
            }]
        },
        options: { 
            indexAxis: 'y', 
            responsive: true, 
            maintainAspectRatio: false, 
            layout: { padding: { right: 30 } },
            scales: { 
                x: { beginAtZero: true, suggestedMax: 20, grid: { borderDash: [4, 4] }, ticks: { precision: 0 } },
                y: { grid: { display: false } }
            }, 
            plugins: { 
                legend: { display: false },
                datalabels: { align: 'right', anchor: 'end', color: '#475569', font: { weight: 'bold' } }
            } 
        }
    });

    // Graphique 5 : Historique annuel avec moyenne
    new Chart(document.getElementById('historiqueChart'), {
        type: 'bar', // Type de base
        data: {
            labels: ['Juin 21', 'Juil 21', 'Août 21', 'Sept 21', 'Oct 21', 'Nov 21', 'Déc 21', 'Janv 22', 'Févr 22', 'Mars 22', 'Avr 22', 'Mai 22', 'Juin 22'],
            datasets: [
                {
                    type: 'line', // Surcharge pour afficher une ligne
                    label: 'Moyenne (34)',
                    data: [34, 34, 34, 34, 34, 34, 34, 34, 34, 34, 34, 34, 34],
                    borderColor: colors.slate,
                    borderWidth: 2,
                    borderDash: [5, 5],
                    pointRadius: 0,
                    fill: false,
                    datalabels: { display: false } // On cache les étiquettes pour la ligne de moyenne pour ne pas surcharger
                },
                {
                    type: 'bar',
                    label: 'Nombre de réclamations',
                    data: [34, 39, 46, 28, 24, 26, 22, 31, 34, 36, 39, 42, 44],
                    backgroundColor: colors.lightBlue,
                    borderColor: colors.blue,
                    borderWidth: 1,
                    borderRadius: 4,
                    datalabels: { align: 'top', anchor: 'end', color: colors.blue, font: { weight: 'bold', size: 11 } }
                }
            ]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            layout: { padding: { top: 25 } },
            scales: { 
                y: { beginAtZero: true, suggestedMax: 50, grid: { borderDash: [4, 4] } },
                x: { grid: { display: false } }
            }, 
            plugins: { 
                legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8 } }
            } 
        }
    });
</script>
</body>
</html>
